<div class="container">
  <img src="./images/scenes/upper-ozone/space-background.png" style="width:100%; height:100%; position: absolute;" alt="space">
  <app-narrative-text
    [text]="'SCENES.UPPER_OZONE.TEXT_1' | translate"
    (completed)="story.setSceneCompleted(true)"
    [startDelay]="story.transition().textDelay"
    style="z-index: 50;"
  />
  <div class="ray-containter"
  style="position: absolute; left:100px; top:100px;">
    <img class="rays" id="rays" alt="rays from the sun" src="./images/scenes/upper-ozone/rays.png">
    <img class="sun" id="sun" alt="sun" src="./images/scenes/upper-ozone/space-sun.png" style="z-index: 10;">
  </div>
  <img class="earth" id="earth" src="./images/scenes/upper-ozone/shielded-earth.png"
    alt="earth surrounded by the ozone layer">
</div>
