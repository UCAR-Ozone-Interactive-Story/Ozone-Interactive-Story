<div class="container">
  <img src="./images/scenes/vehicles/collage_vehicles_background.png" style="width:100%; height:100%; position: absolute; z-index: 0;" alt="city street">
  <app-narrative-text
    [text]="'SCENES.VEHICLE_TYPES.TEXT_1' | translate"
    (completed)="story.setSceneCompleted(true)"
    [startDelay]="story.transition().textDelay"
  />

  <div class="aspectwrapper">
    <div class="content">
      <img src="./images/scenes/vehicles/vehicle_bike.png" class="vehicle" alt="bicycle"
      style="left:2vh; height:20vh;">
      <div style="display: inline flow-root; outline: thick green;">
        <img src="./images/scenes/vehicles/vehicle_motorcycle.png" class="vehicle" alt="motorcycle"
        style="height:25vh;">
        <img src="./images/scenes/vehicles/vehicle_bus.png" class="vehicle" alt="bus"
        style="height:30vh;">
        <img src="./images/scenes/vehicles/vehicle_scooter.png" class="vehicle" alt="scooter"
        style="height:30vh;">
        <img src="./images/scenes/vehicles/vehicle_car.png" class="vehicle" alt="car"
        style="height:20vh;">
      </div>
      
    </div>
  </div>


  <!-- <div style="position: relative; right:2vh; height: 90vh; width: 130vh; bottom:0vh; background-color: aliceblue; color: aliceblue;">
    
  </div> -->
  

  <div style="border-color: aqua;" >
    <img src="./images/scenes/vehicles/oil_and_coal.png" alt="a gas pump and a bucket of coal"
    style="position: absolute; top: 10px; right: 0px; height: 50vh;">
  </div>
</div>
