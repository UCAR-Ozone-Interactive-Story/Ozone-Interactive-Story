<div class="container">
  <!-- <img src="./images/scenes/vehicles/collage_vehicles_background.png" style="width:100%; height:100%; position: absolute; z-index: 0;" alt="city street"> -->
  <app-layer-wrapper>

    <app-street bg-layer></app-street>
    
    <app-narrative-text
      textKey="SCENES.VEHICLE_TYPES.TEXT_1"
      (completed)="showNextText()"
      [startDelay]="story.transition().textDelay"
    />

    <div style="position:absolute; left:15vh; height:25vh; bottom:30vh; display:inline-block; margin: 0 auto; padding:10px; text-align: left;">
      <img src="./images/scenes/vehicles/vehicle_bike.png" class="vehicle" alt="bicycle" style="height: 25vh; display: block; margin: 0 auto;">
      @if (showSecondText) {
        <div class="bubble-container" style="width: 30vw;">
            <app-narrative-text
            textKey="SCENES.VEHICLE_TYPES.TEXT_2"
            (completed)="story.setSceneCompleted(true)"
            [startDelay]="200"
            class="main-text"
          />
        </div>
      }
    </div>

    <div class="vehicle-container">
      <div class="vehicle-column">
          <div class="vehicle-row">
            <img src="./images/scenes/vehicles/vehicle_motorcycle.png" class="vehicle" alt="motorcycle"
            style="height:25vh;">
          </div>
          <div class="vehicle-row">
            <img src="./images/scenes/vehicles/vehicle_bus.png" class="vehicle" alt="bus"
            style="height:30vh;">
          </div>
      </div>
      <div class="vehicle-column">
          <img src="./images/scenes/vehicles/oil.png" alt="gas pump"
          style="height: 50vh;">
      </div>
      <div class="vehicle-column">
          <div class="vehicle-row">
            <img src="./images/scenes/vehicles/vehicle_scooter.png" class="vehicle" alt="scooter"
            style="height:30vh;">
          </div>
          <div class="vehicle-row">
            <img src="./images/scenes/vehicles/vehicle_car.png" class="vehicle" alt="car"
            style="height:20vh;">
          </div>
      </div>
    </div>
  </app-layer-wrapper>
</div>
