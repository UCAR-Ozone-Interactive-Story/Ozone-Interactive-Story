<div class="container">
  <app-layer-wrapper>
    <app-sky-grass bg-layer></app-sky-grass>
    <div class="sun-container">
      <div class="sun"></div>
    </div>
    <app-clouds></app-clouds>

    <!-- Molecules show up when selected -->
    <div class="molecule-display">
      <div class="molecule-circle" [class.visible]="isMoleculeVisible('n2')">
        <span class="molecule-label">N₂</span>
      </div>
      <div class="molecule-circle" [class.visible]="isMoleculeVisible('o2')">
        <span class="molecule-label">O₂</span>
      </div>
      <div class="molecule-circle" [class.visible]="isMoleculeVisible('other')">
        <span class="molecule-label">Other</span>
      </div>
    </div>

    <app-narrative-text
      [text]="'SCENES.AIR.NARRATIVE' | translate"
    />
    <app-multiple-choice
      [question]="'What gases are in Earth\'s atmosphere?'"
      [options]="[
        { id: 'n2', label: 'N₂', isCorrect: true },
        { id: 'o2', label: 'O₂', isCorrect: true },
        { id: 'f2', label: 'F₂', isCorrect: false },
        { id: 'c2', label: 'C₂', isCorrect: false },
        { id: 'other', label: 'Small Amounts of Other Gases', isCorrect: true }
      ]"
      (optionSelected)="onOptionSelected($event)"
    ></app-multiple-choice>
  </app-layer-wrapper>
</div>
