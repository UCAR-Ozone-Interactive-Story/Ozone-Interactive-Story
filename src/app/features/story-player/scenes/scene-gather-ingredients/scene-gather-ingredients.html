<div class="container">
  <app-narrative-text
    [text]="'SCENES.GATHER_INGREDIENTS.TEXT_1' | translate"
    (completed)="story.nextScene()"
  />

<div id="paint-cans" role="img" aria-label="3 paint cans of various colors">
    @for (item of paintCanContents; track item){
        <div class="molecule-circle"
        cdkDrag
        (cdkDragEnded)="handleDragEnd($event)"
        >
            <span class="molecule-label">{{item}}</span>
        </div>
    }
</div>
   <div
    class="smog "
    id = "starting-zone"
   > 

    @for (item of molecules1; track item){
        <div class="molecule-circle"
        cdkDrag
        (cdkDragEnded)="handleDragEnd($event)"
        >
            <span class="molecule-label">{{item}}</span>
        </div>
    }
    </div>
   
  <div
    class="smog ozone-cloud"
    title="creating ozone"
    id="ozone-cloud"
  >
    @for (item of ozoneCloudContents; track item){
        <div class="molecule-circle"
        cdkDrag
        >
            <span class="molecule-label">{{item}}</span>
        </div>
    }
</div>
</div>
