<div class="container">
  <app-layer-wrapper>
    <app-burning-fuels bg-layer></app-burning-fuels>

      <app-narrative-text
        [text]="'SCENES.BURNING_FUELS.TEXT_1' | translate"
        [startDelay]="story.transition().textDelay"/>
    <div class="content">
      <div class="interactive-object car"
        (click)="activateCar()"
        (keydown.space)="activateCar()"
        [class.active]="isCarActive()"
        tabindex="0"
        aria-label="Car"
      >
        <img src="images/scenes/vehicles/vehicle_car.png" alt="Car" />

        @if (isCarActive()) {
          <div class="particle-emitter exhaust">
            <div class="gas-cloud cloud-1"></div>
            <div class="gas-cloud cloud-2"></div>
          </div>
          <div class="bubble-container" style="width: 40vw;">
            <app-narrative-text [text]="'SCENES.BURNING_FUELS.CAR_BUBBLE' | translate"/>
          </div>
        }
      </div>
      <div class="interactive-object factory"
        (click)="activateFactory()"
        (keydown.space)="activateFactory()"
        [class.active]="isFactoryActive()"
        tabindex="0"
        aria-label="Factory"
      >
        <img src="images/foregrounds/factory.png" class="factory" alt="Factory"/>

        @if (isFactoryActive()) {
          <div class="particle-emitter">
            <div class="gas-cloud cloud-1"></div>
            <div class="gas-cloud cloud-2"></div>
            <div class="gas-cloud cloud-3"></div>
          </div>
          <div class="bubble-container" style="width: 40vw;">
            <app-narrative-text [text]="'SCENES.BURNING_FUELS.FACTORY_BUBBLE' | translate" />
          </div>
        }
      </div>


    </div>
  </app-layer-wrapper>
</div>
