<app-navbar></app-navbar>

<div class="scene-container">
  @for (scene of [service.currentScene()]; track scene.id) {
    <div
      class="scene"
      [animate.enter]="enterAnimation"
      [animate.leave]="leaveAnimation"
    >
      <ng-container [ngComponentOutlet]="scene.component"></ng-container>
    </div>
  }
<app-scene-navigation></app-scene-navigation>
</div>
