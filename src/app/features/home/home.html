<div class="container" [class.transitioning]="isTransitioning">
  <app-layer-wrapper>
    <app-sky-grass bg-layer></app-sky-grass>
    <img class="sun" src="images/scenes/upper-ozone/space-sun.png">
    <app-clouds></app-clouds>

    <div class="content">
      <h1 class="title">{{ 'START_PAGE.TITLE' | translate }}</h1>

      <app-language-dropdown></app-language-dropdown>

      <button class="action-btn start-btn" (click)="start()">
        {{ 'START_PAGE.START' | translate }}
      </button>
    </div>
  </app-layer-wrapper>
</div>
