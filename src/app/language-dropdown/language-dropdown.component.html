<mat-form-field class='language-field' appearance="fill">
  <mat-label [translate]="'SETTINGS.LANGUAGE'"></mat-label>

  <mat-select [value]="selectedLang" (selectionChange)="changeLanguage($event.value)">
    <mat-option *ngFor="let lang of languages" [value]="lang.code">
      {{ lang.label }}
    </mat-option>
  </mat-select>
</mat-form-field>
