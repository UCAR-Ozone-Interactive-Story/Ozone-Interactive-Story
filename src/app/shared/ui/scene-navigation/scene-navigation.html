@if (canGoPrevious()) {
  <button
    type="button"
    class="nav-button left-arrow"
    (click)="goToPrevious()"
    aria-label="previous scene"
  >
    ←
  </button>
}

@if (canGoNext()) {
  <button
    type="button"
    class="nav-button right-arrow pulse"
    (click)="goToNext()"
    aria-label="next scene"
  >
    →
  </button>
}
