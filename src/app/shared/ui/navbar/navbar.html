<nav class="bottom-nav" role="navigation" aria-label="App navigation">
  <div class="menu">
    <button class="menu-button" (click)="toggle()" aria-expanded="{{open}}">
      {{ 'NAVIGATION.SCREENS' | translate }}
    </button>

    <div class="menu-panel" *ngIf="open">
      @for (scene of story.allScenes(); track scene.id) {
        <button class="item" (click)="navigate(scene)">{{ scene.i18n | translate }}</button>
      }
    </div>
  </div>
</nav>
